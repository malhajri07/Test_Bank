name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff
        run: ruff check . --output-format=github

      - name: Run Ruff format check
        run: ruff format --check .

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testbank_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testbank_test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: testbank_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "False"
      STRIPE_SECRET_KEY: ""
      STRIPE_PUBLIC_KEY: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest-cov

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run tests
        run: pytest testbank_platform/tests.py accounts/tests.py catalog/tests/ payments/tests/ practice/tests/ api/tests/ --cov=. --cov-report=xml --cov-report=term-missing --cov-fail-under=50 -v
        env:
          DJANGO_SETTINGS_MODULE: testbank_platform.settings

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt bandit pip-audit

      - name: Run Bandit
        run: bandit -r . -x ./venv,./.venv,./migrations -ll

      - name: Run pip-audit
        run: pip-audit

  e2e:
    runs-on: ubuntu-latest
    needs: [lint, test]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: testbank_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready -U postgres
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/testbank_test
      DB_HOST: localhost
      DB_PORT: 5432
      DB_NAME: testbank_test
      DB_USER: postgres
      DB_PASSWORD: postgres
      SECRET_KEY: test-secret-key-for-ci
      DEBUG: "False"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Run migrations
        run: python manage.py migrate --noinput

      - name: Run E2E tests
        run: pytest e2e/ -v --slowmo 100
        env:
          DJANGO_SETTINGS_MODULE: testbank_platform.settings
